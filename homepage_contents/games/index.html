<!doctype html>
<html lang="ja">
  <head>

    <base href="../">

    <link rel="preload" as="image" href="assets/hero-arcanade.png">
    <link rel="stylesheet" href="styles.css">

  <body>
    <div class="app-shell">
      <nav class="side-nav" aria-label="メインナビゲーション">
        <a class="brand" href="./" data-nav="home" aria-label="ARCANADE トップ">

        <div class="nav-links">
          <button class="nav-link" type="button" data-nav="home" aria-label="トップ">
            <span class="nav-icon">⌂</span>
            <span>トップ</span>
          </button>
          <button class="nav-link" type="button" data-nav="blog" aria-label="ブログ">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M6 4.5h10.5a1.5 1.5 0 0 1 1.5 1.5v12.5a1 1 0 0 1-1.35.94L15 18.75l-2.15.69a1 1 0 0 1-.7 0L10 18.75l-2.15.69a1 1 0 0 1-1.35-.94V4.5Z"></path>

                <path d="M9 11.5h6"></path>
                <path d="M9 15h4"></path>
              </svg>
            </span>

          </button>
          <button class="nav-link" type="button" data-nav="works" aria-label="制作物">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4.5 19.5 6 15l9.9-9.9a1.8 1.8 0 0 1 2.55 0l.45.45a1.8 1.8 0 0 1 0 2.55L9 18l-4.5 1.5Z"></path>

                <path d="M6 15l3 3"></path>
              </svg>
            </span>
            <span>制作物</span>
          </button>
          <button class="nav-link is-active" type="button" data-nav="games" aria-label="ミニゲーム">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M8.2 10.2h7.6c2.3 0 4.2 1.8 4.5 4.1l.26 2.1a2.3 2.3 0 0 1-3.94 1.9l-1.52-1.55H8.9L7.38 18.3a2.3 2.3 0 0 1-3.94-1.9l.26-2.1c.3-2.3 2.2-4.1 4.5-4.1Z"></path>
                <path d="M8.3 13v3"></path>
                <path d="M6.8 14.5h3"></path>
                <path d="M15.8 14.1h.01"></path>
                <path d="M17.7 15.5h.01"></path>
              </svg>
            </span>
            <span>ゲーム</span>
          </button>
          <button class="nav-link" type="button" data-nav="contact" aria-label="コンタクト">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4.5 6.5h15a1.5 1.5 0 0 1 1.5 1.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 17V8a1.5 1.5 0 0 1 1.5-1.5Z"></path>
                <path d="m4.5 8 7.5 5.4L19.5 8"></path>
              </svg>
            </span>
            <span>連絡</span>
          </button>
        </div>
      </nav>

      <main class="site-main" id="main">
        
        
        
        <section class="view is-current" id="games-view" data-view="games" aria-labelledby="games-title">
          <div class="page-head">
            <div>
              <p class="eyebrow">Mini Games</p>
              <h1 id="games-title">ミニゲーム</h1>
            </div>
          </div>
          <div class="game-layout">
            <aside class="game-list" id="game-list" aria-label="ミニゲーム一覧"></aside>
            <article class="game-stage" id="game-stage"></article>
          </div>
        </section>

        </main>
    </div>
    <script>
      window.ARCANADE_PAGE = {"view":"games","detailType":"","detailId":""};
    </script>
    <script src="app.js" defer></script>
  </body>
</html>
