<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Lab</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #101716;
        color: #eef4f0;
        font-family: system-ui, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .stage {
        width: min(80vmin, 520px);
        aspect-ratio: 1;
        position: relative;
        display: grid;
        place-items: center;
        border: 1px solid rgba(238, 244, 240, 0.18);
        border-radius: 24px;
        background:
          radial-gradient(circle at 50% 50%, rgba(14, 119, 109, 0.28), transparent 42%),
          linear-gradient(135deg, rgba(198, 139, 53, 0.22), transparent 48%),
          #151f1d;
      }

      .orb {
        width: 92px;
        height: 92px;
        border-radius: 50%;
        background: #c68b35;
        box-shadow: 0 0 42px rgba(198, 139, 53, 0.45);
        animation: orbit 4.6s ease-in-out infinite alternate;
      }

      .label {
        position: absolute;
        bottom: 28px;
        color: rgba(238, 244, 240, 0.76);
        font-size: 14px;
        letter-spacing: 0;
      }

      @keyframes orbit {
        from {
          transform: translate(-90px, 44px) scale(0.82);
        }

        to {
          transform: translate(90px, -44px) scale(1.08);
        }
      }
    </style>
  </head>
  <body>
    <div class="stage" aria-label="Mini Lab placeholder">
      <div class="orb"></div>
      <div class="label">Unity WebGL slot</div>
    </div>
  </body>
</html>
